[patches]
nitro_rebranding = true
discord_rebranding = true
title_rebranding = true
server_to_guild = true

sentry_redirect = true
status_page_redirect = false

prevent_localstorage_deletion = true
fast_identify = true
gateway_reconnect = true
remove_qr_login = true
enable_dev_experiments = false
remove_modals = true
no_xss_warning = true
vencord = false

# Proxy API calls through ug2-client to our Underground API
api_proxy = true

# Rewrite hardcoded cdn.discordapp.com / media.discordapp.net references in JS bundles
cdn_redirect = true

# Inject runtime JS shim that re-routes Discord-only metadata paths back to discord.com
# (the custom CDN doesn't proxy /assets/, /detectables/, /changelogs/, etc.)
cdn_bypass = true

[server]
trust_proxy_headers = false
rate_limit_enabled = false
rate_limit_requests = 60
rate_limit_window_secs = 60

[branding]
instance_name = "Celeste"
instance_url = "http://localhost:5002"
gateway_url = "ws://localhost:5001"
cdn_url = "https://cdn.celeste.gg"
media_proxy_url = "https://media.celeste.gg"
sentry_url = "https://sentry.io"
status_url = "status.discord.com"
